<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Strict CSP — connect-src 'none' means the renderer process cannot
      make ANY outbound network requests. All relay traffic flows
      through the main process via the relay:call IPC. style-src allows
      'unsafe-inline' so React's inline styles work; script-src is
      'self'-only so no remote scripts load.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aeris</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
