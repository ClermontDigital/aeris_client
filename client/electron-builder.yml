appId: com.aeris.client
productName: Aeris
copyright: Copyright (c) 2026 Clermont Digital
artifactName: ${productName}-${version}-${arch}.${ext}

directories:
  output: dist
  buildResources: build

# electron-vite emits the production bundle to out/ (see electron-vite.config.ts).
# package.json `main` points at out/main/index.js — keep these in lockstep.
files:
  - out/**
  - package.json
  - "!node_modules/**/{*.md,LICENSE,README*,test/**,tests/**,docs/**,*.map}"

asar: true

mac:
  category: public.app-category.business
  icon: build/icons/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  notarize: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  sign: false
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

win:
  icon: build/icons/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Aeris
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: build/icons/icon.png
  category: Office
  synopsis: Aeris point-of-sale client
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

publish:
  provider: github
  owner: ClermontDigital
  repo: aeris_client
  releaseType: release
