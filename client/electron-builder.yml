appId: com.aeris.client
productName: Aeris
copyright: Copyright (c) Aeris
artifactName: Aeris-${version}-${arch}.${ext}

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

# Phase 4 will finalise sign / notarisation / publish wiring.
# These are skeleton targets only — enough to attempt a local build.
mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  category: Office
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
