name: Android build (native Gradle)

# On-demand native Gradle Android build for the AERIS mobile app (mobile/).
# Plain ./gradlew on a GitHub-hosted runner — no EAS, no cloud credits.
# Mirrors the iOS Xcode Cloud path (mobile/ios/ci_scripts/ci_post_clone.sh):
# prebuild on every run, stamp the build number from a CI-monotonic counter.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   ANDROID_KEYSTORE_BASE64           base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD         keystore password
#   ANDROID_KEY_ALIAS                 key alias inside the keystore
#   ANDROID_KEY_PASSWORD              alias password
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON  base64 of Play service-account JSON (only when submit=true)
#
# Triggers:
#   workflow_dispatch — pick profile + whether to submit to Play. Ad-hoc
#                       sideload / Play-submit build; artifacts only, no Release.
#   push tag mobile-v* — cuts a GitHub Release with the signed APK + AAB
#                        attached (parity with the desktop client-v* releases),
#                        so the build lives in Releases, not an ephemeral
#                        workflow artifact.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile (production | preview)
        type: choice
        options: [production, preview]
        default: production
      submit:
        description: Submit AAB to Google Play (internal track)
        type: boolean
        default: false
  push:
    tags:
      - 'mobile-v*'

# Needed by softprops/action-gh-release to create the Release on a tag push.
permissions:
  contents: write

jobs:
  build:
    name: Build signed APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20 (Expo SDK 55 / RN 0.83)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17 (AGP 8 / RN 0.83)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.1.12297006'

      # Install from the repo ROOT so the @aeris/shared workspace resolves
      # into mobile/. Matches ci_post_clone.sh; --legacy-peer-deps because
      # the RN 0.83 stack still ships overlapping peer ranges.
      - name: Install workspace deps
        run: npm ci --legacy-peer-deps --include-workspace-root

      # @react-native-cookies/cookies@6.2.1 still calls jcenter() in its
      # android/build.gradle. Gradle 9 (generated by Expo SDK 55 prebuild)
      # removed jcenter(), so the config phase dies with "Could not find
      # method jcenter()". The library has no newer release, so we neutralise
      # the call after install (before Gradle reads it). `find` makes this
      # hoisting-agnostic; the sed is idempotent (a second run no-ops on the
      # already-commented line). If this ever stops matching, the build will
      # fail loudly at the jcenter() line rather than silently skipping.
      - name: Strip removed jcenter() from third-party gradle (Gradle 9)
        run: |
          matches=$(find . -path '*/@react-native-cookies/cookies/android/build.gradle')
          if [ -z "$matches" ]; then
            echo "::error::cookies build.gradle not found — jcenter patch could not be applied"
            exit 1
          fi
          echo "$matches" | while read -r f; do
            sed -i 's#^\([[:space:]]*\)jcenter()#\1// jcenter() removed for Gradle 9#' "$f"
            echo "Patched $f"
          done

      # mobile/android isn't committed (managed workflow). Prebuild
      # regenerates it from app.json each run.
      - name: Prebuild Android project
        working-directory: mobile
        env:
          CI: '1'
          EXPO_NO_GIT_STATUS: '1'
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode upload keystore
        working-directory: mobile/android/app
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KS" | base64 -d > upload.keystore

      # Stamp signing config + versionCode into gradle.properties. The RN
      # template wires MYAPP_UPLOAD_* by convention; versionCode comes from
      # GITHUB_RUN_NUMBER — same pattern as iOS Xcode Cloud
      # (CI_BUILD_NUMBER → CFBundleVersion) so the two stores stay
      # monotonic without colliding.
      - name: Write signing + versionCode to gradle.properties
        working-directory: mobile/android
        run: |
          {
            echo ""
            echo "MYAPP_UPLOAD_STORE_FILE=upload.keystore"
            echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
            echo "VERSION_CODE=${{ github.run_number }}"
          } >> gradle.properties
          # Expo's Android template hardcodes versionCode 1. Patch it to
          # consume the gradle.properties value so Play sees a unique
          # versionCode per CI run.
          sed -i -E "s/versionCode [0-9]+/versionCode (project.hasProperty('VERSION_CODE') ? VERSION_CODE.toInteger() : 1)/" app/build.gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build release APK + AAB
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Upload APK (sideload to Samsung tablet)
        uses: actions/upload-artifact@v4
        with:
          name: aeris-android-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: aeris-android-aab
          path: mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      # ---- GitHub Release (tag pushes only) --------------------------------
      # On a mobile-v* tag, attach the signed APK + AAB to a GitHub Release so
      # the build is downloadable from the Releases page — the same way the
      # desktop client publishes on client-v* tags. workflow_dispatch runs are
      # ad-hoc and have no tag, so they skip this and keep only the artifacts.
      - name: Stage release assets (versioned filenames)
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#mobile-v}"
          cp mobile/android/app/build/outputs/apk/release/app-release.apk \
            "release-assets/aeris-${VERSION}.apk"
          cp mobile/android/app/build/outputs/bundle/release/app-release.aab \
            "release-assets/aeris-${VERSION}.aab"
          ls -la release-assets

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Aeris Mobile ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*

      - name: Submit AAB to Google Play (internal)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.submit == true }}
        working-directory: mobile/android
        env:
          SA_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          trap "rm -f /tmp/play-sa.json" EXIT
          echo "$SA_JSON" | base64 -d > /tmp/play-sa.json
          gem install --no-document fastlane
          fastlane supply \
            --aab app/build/outputs/bundle/release/app-release.aab \
            --package_name com.aeris.erp \
            --json_key /tmp/play-sa.json \
            --track internal \
            --release_status draft
