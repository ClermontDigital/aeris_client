name: Build and Release Aeris Client

on:
  push:
    branches: [ release ]
    tags:
      - 'client-v*'
      - 'desktop-v1-v*'
      # mobile-v* is handled by .github/workflows/android-build.yml (Android)
      # and Xcode Cloud (iOS), not this workflow.
  pull_request:
    branches: [ release ]
  workflow_dispatch:
    inputs:
      build_archive_v1:
        description: 'Manually rebuild archived desktop-v1 (security patch)'
        required: false
        default: 'false'

permissions:
  contents: write
  discussions: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      shared_changed: ${{ steps.filter.outputs.shared }}
      # mobile-only paths fire test-mobile (typecheck + jest only;
      # production builds run on Xcode Cloud + android-build.yml)
      mobile_changed: ${{ steps.filter.outputs.mobile }}
      # mobile + shared fires the cheap mobile-typecheck (type-drift catcher)
      mobile_or_shared_changed: ${{ steps.filter.outputs.mobile_or_shared }}
      client_changed: ${{ steps.filter.outputs.client }}
      archive_changed: ${{ steps.filter.outputs.archive }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          shared:
            - 'shared/**'
          mobile:
            - 'mobile/**'
          mobile_or_shared:
            - 'mobile/**'
            - 'shared/**'
          client:
            - 'client/**'
            - 'shared/**'
          archive:
            - 'archive/desktop-v1/**'

  # ------------------------------------------------------------------
  # Shared package — contract layer for mobile + client. Runs whenever
  # shared/** changes; gracefully no-ops while the package has no tests.
  # ------------------------------------------------------------------
  shared-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.shared_changed == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install workspace dependencies
      run: npm ci --workspaces --include-workspace-root
    - name: Run shared tests (skip if none)
      working-directory: shared
      run: npm test --if-present

  # ------------------------------------------------------------------
  # Client (Aeris v2) — Electron app at client/. Stub: each job only
  # runs once client/package.json exists (Phase 2 lands the package).
  # Until then `hashFiles('client/package.json')` returns '' and the
  # job is skipped — no false greens.
  # ------------------------------------------------------------------
  client-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.client_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    # Lockstep typecheck for shared + client (peer review revision #4).
    - run: npx tsc --build
      working-directory: .
    - run: npm test
    - run: npm run test:coverage --if-present
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: client-coverage
        path: client/coverage/
        retention-days: 7

  client-build-mac:
    needs: [detect-changes, client-test]
    if: needs.detect-changes.outputs.client_changed == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    - name: electron-vite production bundle
      run: npm run build
    - name: Package signed + notarised dmg/zip
      env:
        CSC_LINK: ${{ secrets.CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm run package:mac
    - name: Notarize macOS DMGs (manual fallback if builder didn't notarize)
      continue-on-error: true
      env:
        APPLE_ID: '${{ secrets.APPLE_ID }}'
        APPLE_ID_PASS: '${{ secrets.APPLE_ID_PASS }}'
        APPLE_TEAM_ID: '${{ secrets.APPLE_TEAM_ID }}'
      run: |
        xcrun notarytool store-credentials "notary-profile" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASS" \
          --team-id "$APPLE_TEAM_ID"
        for dmg in dist/*.dmg; do
          echo "Notarizing $dmg..."
          xcrun notarytool submit "$dmg" \
            --keychain-profile "notary-profile" \
            --wait --timeout 20m || echo "Notarization failed for $dmg, continuing..."
          xcrun stapler staple "$dmg" || echo "Stapling failed for $dmg, continuing..."
        done
    - uses: actions/upload-artifact@v4
      with:
        name: aeris-mac
        path: |
          client/dist/*.dmg
          client/dist/*.zip
          client/dist/*.blockmap
          client/dist/latest-mac.yml
        retention-days: 30

  client-build-win:
    needs: [detect-changes, client-test]
    if: needs.detect-changes.outputs.client_changed == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    - name: electron-vite production bundle
      run: npm run build
    # Windows code-sign cert availability is the open question for 2.0.0.
    # If WIN_CSC_LINK is configured the package step signs; otherwise the
    # build proceeds unsigned (electron-builder logs a warning, no error).
    # SmartScreen will warn end users until 2.0.1 ships with a cert.
    - name: Package nsis installer
      env:
        CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm run package:win
    - uses: actions/upload-artifact@v4
      with:
        name: aeris-windows
        path: |
          client/dist/*.exe
          client/dist/*.blockmap
          client/dist/latest.yml
        retention-days: 30

  client-build-linux:
    needs: [detect-changes, client-test]
    if: needs.detect-changes.outputs.client_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    - name: Install Linux build dependencies
      run: sudo apt-get update && sudo apt-get install -y libarchive-tools
    - name: electron-vite production bundle
      run: npm run build
    - name: Package AppImage + deb
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm run package:linux
    - uses: actions/upload-artifact@v4
      with:
        name: aeris-linux
        path: |
          client/dist/*.AppImage
          client/dist/*.deb
          client/dist/latest-linux.yml
        retention-days: 30

  # ------------------------------------------------------------------
  # Mobile — Jest + typecheck only. iOS production builds run on Xcode
  # Cloud (mobile/ios/ci_scripts/ci_post_clone.sh); Android production
  # builds run via .github/workflows/android-build.yml (native Gradle).
  # ------------------------------------------------------------------
  test-mobile:
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json
    - run: npm ci
    - run: npm test
    - run: npm run test:coverage
    - uses: actions/upload-artifact@v4
      with:
        name: mobile-coverage
        path: mobile/coverage/
        retention-days: 7

  # ------------------------------------------------------------------
  # Mobile typecheck — root tsc --build does not include mobile (it's
  # not a composite project), so a shared/** change can break mobile
  # types and slip past CI. This job runs `tsc --noEmit` against
  # mobile/ directly.
  # ------------------------------------------------------------------
  mobile-typecheck:
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile_or_shared_changed == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
    - run: npx tsc --noEmit
      working-directory: mobile

  # ------------------------------------------------------------------
  # Archive (desktop-v1) — manual security-patch builds only. Gated on
  # workflow_dispatch with build_archive_v1=true OR a desktop-v1-v* tag.
  # Builds from archive/desktop-v1/ and reuses the v1 code-sign / notary
  # credentials. Tag scheme: desktop-v1-vX.Y.Z.
  # ------------------------------------------------------------------
  archive-build-v1:
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_archive_v1 == 'true') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/desktop-v1-v'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    defaults:
      run:
        working-directory: archive/desktop-v1
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: archive/desktop-v1/package-lock.json
    - run: npm ci
    - name: Run tests
      run: npm test
    - name: Install Linux build dependencies
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y libarchive-tools
    - name: Build for macOS
      if: matrix.os == 'macos-latest'
      env:
        CI: false
        GITHUB_ACTIONS: false
        CSC_LINK: ${{ secrets.CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      run: npm run build:mac
    - name: Notarize macOS DMGs
      if: matrix.os == 'macos-latest'
      continue-on-error: true
      env:
        APPLE_ID: '${{ secrets.APPLE_ID }}'
        APPLE_ID_PASS: '${{ secrets.APPLE_ID_PASS }}'
        APPLE_TEAM_ID: '${{ secrets.APPLE_TEAM_ID }}'
      run: |
        xcrun notarytool store-credentials "notary-profile" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASS" \
          --team-id "$APPLE_TEAM_ID"
        for dmg in dist/*.dmg; do
          echo "Notarizing $dmg..."
          xcrun notarytool submit "$dmg" \
            --keychain-profile "notary-profile" \
            --wait --timeout 20m || echo "Notarization failed for $dmg, continuing..."
          xcrun stapler staple "$dmg" || echo "Stapling failed for $dmg, continuing..."
        done
    - name: Build for Windows
      if: matrix.os == 'windows-latest'
      env:
        CI: false
        GITHUB_ACTIONS: false
      run: npm run build:win
    - name: Build for Linux
      if: matrix.os == 'ubuntu-latest'
      env:
        CI: false
        GITHUB_ACTIONS: false
      run: npm run build:linux
    - uses: actions/upload-artifact@v4
      with:
        name: archive-desktop-v1-${{ matrix.os }}
        path: |
          archive/desktop-v1/dist/*.dmg
          archive/desktop-v1/dist/*.exe
          archive/desktop-v1/dist/*.AppImage
          archive/desktop-v1/dist/*.deb
        retention-days: 30

  # ------------------------------------------------------------------
  # Release — per-app tag-pattern routing. Each app reads its own version
  # and tags with its own prefix:
  #   client-vX.Y.Z       -> Aeris v2 client release
  #   mobile-vX.Y.Z       -> handled by android-build.yml (Android) +
  #                          Xcode Cloud (iOS); nothing to do here
  #   desktop-v1-vX.Y.Z   -> archived v1 security-patch release
  # ------------------------------------------------------------------
  release-client:
    needs: [client-build-mac, client-build-win, client-build-linux]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/client-v') &&
      (needs.client-build-mac.result == 'success' || needs.client-build-mac.result == 'skipped') &&
      (needs.client-build-win.result == 'success' || needs.client-build-win.result == 'skipped') &&
      (needs.client-build-linux.result == 'success' || needs.client-build-linux.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Get client version
      id: version
      run: |
        VERSION=$(node -p "require('./client/package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=client-v$VERSION" >> $GITHUB_OUTPUT
    - uses: actions/download-artifact@v4
      with:
        name: aeris-mac
        path: ./release-assets/
    - uses: actions/download-artifact@v4
      with:
        name: aeris-windows
        path: ./release-assets/
    - uses: actions/download-artifact@v4
      with:
        name: aeris-linux
        path: ./release-assets/
    - run: ls -la ./release-assets/
    # electron-updater consumes latest-mac.yml / latest.yml / latest-linux.yml
    # plus the artifacts they reference, so all three plus the *.blockmap
    # files must land on the release.
    - uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Aeris ${{ steps.version.outputs.version }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: |
          ./release-assets/*

  release-archive-v1:
    needs: [archive-build-v1]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/desktop-v1-v') &&
      needs.archive-build-v1.result == 'success'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Get archive version
      id: version
      run: |
        VERSION=$(node -p "require('./archive/desktop-v1/package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=desktop-v1-v$VERSION" >> $GITHUB_OUTPUT
    - uses: actions/download-artifact@v4
      with:
        path: ./release-assets/
        pattern: archive-desktop-v1-*
        merge-multiple: true
    - run: ls -la ./release-assets/
    - uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Aeris Desktop v1 ${{ steps.version.outputs.version }} (archived security patch)
        body: |
          Archived Aeris Desktop v1.x security-patch release. The active product line is `client/` (Aeris v2) — see release tags `client-v*`.
        draft: false
        prerelease: false
        files: |
          ./release-assets/*

  notify:
    needs: [detect-changes, client-build-mac, client-build-win, client-build-linux]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/release' && github.event_name == 'push'
    steps:
    - name: Notify Client Success
      if: needs.detect-changes.outputs.client_changed == 'true' && needs.client-build-mac.result == 'success'
      run: echo "Client (Aeris v2) release built successfully for all platforms!"
    - name: Notify Failure
      if: |
        needs.detect-changes.outputs.client_changed == 'true' && (needs.client-build-mac.result == 'failure' || needs.client-build-win.result == 'failure' || needs.client-build-linux.result == 'failure')
      run: |
        echo "Build failed! Check workflow logs."
        exit 1
