name: Build and Release Aeris Client

on:
  push:
    branches: [ release ]
    tags:
      - 'client-v*'
      - 'mobile-v*'
      - 'desktop-v1-v*'
  pull_request:
    branches: [ release ]
  workflow_dispatch:
    inputs:
      build_archive_v1:
        description: 'Manually rebuild archived desktop-v1 (security patch)'
        required: false
        default: 'false'

permissions:
  contents: write
  discussions: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      shared_changed: ${{ steps.filter.outputs.shared }}
      mobile_changed: ${{ steps.filter.outputs.mobile }}
      client_changed: ${{ steps.filter.outputs.client }}
      archive_changed: ${{ steps.filter.outputs.archive }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          shared:
            - 'shared/**'
          mobile:
            - 'mobile/**'
            - 'shared/**'
          client:
            - 'client/**'
            - 'shared/**'
          archive:
            - 'archive/desktop-v1/**'

  # ------------------------------------------------------------------
  # Shared package — contract layer for mobile + client. Runs whenever
  # shared/** changes; gracefully no-ops while the package has no tests.
  # ------------------------------------------------------------------
  shared-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.shared_changed == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install workspace dependencies
      run: npm ci --workspaces --include-workspace-root
    - name: Run shared tests (skip if none)
      working-directory: shared
      run: npm test --if-present

  # ------------------------------------------------------------------
  # Client (Aeris v2) — Electron app at client/. Stub: each job only
  # runs once client/package.json exists (Phase 2 lands the package).
  # Until then `hashFiles('client/package.json')` returns '' and the
  # job is skipped — no false greens.
  # ------------------------------------------------------------------
  client-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.client_changed == 'true' && hashFiles('client/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    - run: npm test
    - run: npm run test:coverage --if-present
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: client-coverage
        path: client/coverage/
        retention-days: 7

  client-build-mac:
    needs: [detect-changes, client-test]
    if: needs.detect-changes.outputs.client_changed == 'true' && hashFiles('client/package.json') != ''
    runs-on: macos-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    - name: Build for macOS
      env:
        CI: false
        GITHUB_ACTIONS: false
        CSC_LINK: ${{ secrets.CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      run: npm run build:mac
    - name: Notarize macOS DMGs
      continue-on-error: true
      env:
        APPLE_ID: '${{ secrets.APPLE_ID }}'
        APPLE_ID_PASS: '${{ secrets.APPLE_ID_PASS }}'
        APPLE_TEAM_ID: '${{ secrets.APPLE_TEAM_ID }}'
      run: |
        xcrun notarytool store-credentials "notary-profile" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASS" \
          --team-id "$APPLE_TEAM_ID"
        for dmg in dist/*.dmg; do
          echo "Notarizing $dmg..."
          xcrun notarytool submit "$dmg" \
            --keychain-profile "notary-profile" \
            --wait --timeout 20m || echo "Notarization failed for $dmg, continuing..."
          xcrun stapler staple "$dmg" || echo "Stapling failed for $dmg, continuing..."
        done
    - uses: actions/upload-artifact@v4
      with:
        name: client-macos
        path: client/dist/*.dmg
        retention-days: 30

  client-build-win:
    needs: [detect-changes, client-test]
    if: needs.detect-changes.outputs.client_changed == 'true' && hashFiles('client/package.json') != ''
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    - name: Build for Windows
      env:
        CI: false
        GITHUB_ACTIONS: false
      run: npm run build:win
    - uses: actions/upload-artifact@v4
      with:
        name: client-windows
        path: client/dist/*.exe
        retention-days: 30

  client-build-linux:
    needs: [detect-changes, client-test]
    if: needs.detect-changes.outputs.client_changed == 'true' && hashFiles('client/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci --workspaces --include-workspace-root
      working-directory: .
    - name: Install Linux build dependencies
      run: sudo apt-get update && sudo apt-get install -y libarchive-tools
    - name: Build for Linux
      env:
        CI: false
        GITHUB_ACTIONS: false
      run: npm run build:linux
    - uses: actions/upload-artifact@v4
      with:
        name: client-linux
        path: |
          client/dist/*.AppImage
          client/dist/*.deb
        retention-days: 30

  # ------------------------------------------------------------------
  # Mobile — Expo / EAS. Triggers on mobile/** OR shared/** changes.
  # ------------------------------------------------------------------
  test-mobile:
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json
    - run: npm ci
    - run: npm test
    - run: npm run test:coverage
    - uses: actions/upload-artifact@v4
      with:
        name: mobile-coverage
        path: mobile/coverage/
        retention-days: 7

  build-mobile-ios:
    needs: [detect-changes, test-mobile]
    if: needs.detect-changes.outputs.mobile_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json
    - name: Setup EAS
      uses: expo/expo-github-action@v8
      with:
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
    - run: npm ci
    - name: Build iOS and submit to TestFlight
      run: eas build --platform ios --profile production --non-interactive --auto-submit

  build-mobile-android:
    needs: [detect-changes, test-mobile]
    if: needs.detect-changes.outputs.mobile_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json
    - name: Setup EAS
      uses: expo/expo-github-action@v8
      with:
        eas-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
    - run: npm ci
    - name: Build Android
      run: eas build --platform android --profile production --non-interactive

  # ------------------------------------------------------------------
  # Archive (desktop-v1) — manual security-patch builds only. Gated on
  # workflow_dispatch with build_archive_v1=true OR a desktop-v1-v* tag.
  # Builds from archive/desktop-v1/ and reuses the v1 code-sign / notary
  # credentials. Tag scheme: desktop-v1-vX.Y.Z.
  # ------------------------------------------------------------------
  archive-build-v1:
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_archive_v1 == 'true') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/desktop-v1-v'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    defaults:
      run:
        working-directory: archive/desktop-v1
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: archive/desktop-v1/package-lock.json
    - run: npm ci
    - name: Run tests
      run: npm test
    - name: Install Linux build dependencies
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y libarchive-tools
    - name: Build for macOS
      if: matrix.os == 'macos-latest'
      env:
        CI: false
        GITHUB_ACTIONS: false
        CSC_LINK: ${{ secrets.CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      run: npm run build:mac
    - name: Notarize macOS DMGs
      if: matrix.os == 'macos-latest'
      continue-on-error: true
      env:
        APPLE_ID: '${{ secrets.APPLE_ID }}'
        APPLE_ID_PASS: '${{ secrets.APPLE_ID_PASS }}'
        APPLE_TEAM_ID: '${{ secrets.APPLE_TEAM_ID }}'
      run: |
        xcrun notarytool store-credentials "notary-profile" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASS" \
          --team-id "$APPLE_TEAM_ID"
        for dmg in dist/*.dmg; do
          echo "Notarizing $dmg..."
          xcrun notarytool submit "$dmg" \
            --keychain-profile "notary-profile" \
            --wait --timeout 20m || echo "Notarization failed for $dmg, continuing..."
          xcrun stapler staple "$dmg" || echo "Stapling failed for $dmg, continuing..."
        done
    - name: Build for Windows
      if: matrix.os == 'windows-latest'
      env:
        CI: false
        GITHUB_ACTIONS: false
      run: npm run build:win
    - name: Build for Linux
      if: matrix.os == 'ubuntu-latest'
      env:
        CI: false
        GITHUB_ACTIONS: false
      run: npm run build:linux
    - uses: actions/upload-artifact@v4
      with:
        name: archive-desktop-v1-${{ matrix.os }}
        path: |
          archive/desktop-v1/dist/*.dmg
          archive/desktop-v1/dist/*.exe
          archive/desktop-v1/dist/*.AppImage
          archive/desktop-v1/dist/*.deb
        retention-days: 30

  # ------------------------------------------------------------------
  # Release — per-app tag-pattern routing. Each app reads its own version
  # and tags with its own prefix:
  #   client-vX.Y.Z       -> Aeris v2 client release
  #   mobile-vX.Y.Z       -> mobile EAS production submit (handled by
  #                          build-mobile-ios above; nothing to publish here)
  #   desktop-v1-vX.Y.Z   -> archived v1 security-patch release
  #
  # NOTE: full per-app tagging refactor is intentionally minimal in
  # Phase 0 — see "Open questions" at the top of the Phase 0 report.
  # ------------------------------------------------------------------
  release-client:
    needs: [client-build-mac, client-build-win, client-build-linux]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/client-v') &&
      hashFiles('client/package.json') != '' &&
      (needs.client-build-mac.result == 'success' || needs.client-build-mac.result == 'skipped') &&
      (needs.client-build-win.result == 'success' || needs.client-build-win.result == 'skipped') &&
      (needs.client-build-linux.result == 'success' || needs.client-build-linux.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Get client version
      id: version
      run: |
        VERSION=$(node -p "require('./client/package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=client-v$VERSION" >> $GITHUB_OUTPUT
    - uses: actions/download-artifact@v4
      with:
        name: client-macos
        path: ./release-assets/
    - uses: actions/download-artifact@v4
      with:
        name: client-windows
        path: ./release-assets/
    - uses: actions/download-artifact@v4
      with:
        name: client-linux
        path: ./release-assets/
    - run: ls -la ./release-assets/
    - uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Aeris ${{ steps.version.outputs.version }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: |
          ./release-assets/*

  release-archive-v1:
    needs: [archive-build-v1]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/desktop-v1-v') &&
      needs.archive-build-v1.result == 'success'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Get archive version
      id: version
      run: |
        VERSION=$(node -p "require('./archive/desktop-v1/package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_name=desktop-v1-v$VERSION" >> $GITHUB_OUTPUT
    - uses: actions/download-artifact@v4
      with:
        path: ./release-assets/
        pattern: archive-desktop-v1-*
        merge-multiple: true
    - run: ls -la ./release-assets/
    - uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: Aeris Desktop v1 ${{ steps.version.outputs.version }} (archived security patch)
        body: |
          Archived Aeris Desktop v1.x security-patch release. The active product line is `client/` (Aeris v2) — see release tags `client-v*`.
        draft: false
        prerelease: false
        files: |
          ./release-assets/*

  notify:
    needs: [detect-changes, client-build-mac, client-build-win, client-build-linux, build-mobile-ios, build-mobile-android]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/release' && github.event_name == 'push'
    steps:
    - name: Notify Client Success
      if: needs.detect-changes.outputs.client_changed == 'true' && needs.client-build-mac.result == 'success'
      run: echo "Client (Aeris v2) release built successfully for all platforms!"
    - name: Notify Mobile Success
      if: needs.detect-changes.outputs.mobile_changed == 'true' && needs.build-mobile-ios.result == 'success'
      run: echo "Mobile build submitted to TestFlight and Play Store!"
    - name: Notify Failure
      if: |
        (needs.detect-changes.outputs.client_changed == 'true' && (needs.client-build-mac.result == 'failure' || needs.client-build-win.result == 'failure' || needs.client-build-linux.result == 'failure')) ||
        (needs.detect-changes.outputs.mobile_changed == 'true' && (needs.build-mobile-ios.result == 'failure' || needs.build-mobile-android.result == 'failure'))
      run: |
        echo "Build failed! Check workflow logs."
        exit 1
