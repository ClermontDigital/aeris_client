<?xml version="1.0" encoding="UTF-8"?>
<!--
  v1.3.44 layout with BAND_H reduced from 48 to 36 — less navy below
  the wordmark before the tongue starts. Sharp 90° corners restored at
  the chrome's outer-bottom edges (flat horizontal all the way to the
  screen edge). Sample values: insets.top=47.

  Derived:
    cutoutTopY    = 77    (insets.top + BAND_TOP=30)
    bandY         = 113   (cutoutTopY + BAND_H=36)
    tongueBottomY = 129
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="390" height="180"
     viewBox="0 0 390 180"
     preserveAspectRatio="xMidYMin meet">

  <rect x="0" y="0" width="390" height="180" fill="#fdf0d5"/>
  <rect x="0" y="0" width="390" height="113" fill="#003049"/>

  <!-- Cream cutout LEFT — flat horizontal top to the screen edge, then
       Q Bezier curving down to the tongue base. -->
  <path d="M 0 77
           L 95 77
           Q 125 77, 125 113
           L 125 115
           A 14 14 0 0 0 139 129
           L 0 129 Z"
        fill="#fdf0d5"/>

  <!-- Cream cutout RIGHT — mirror. -->
  <path d="M 390 77
           L 295 77
           Q 265 77, 265 113
           L 265 115
           A 14 14 0 0 1 251 129
           L 390 129 Z"
        fill="#fdf0d5"/>

  <!-- Tongue. -->
  <path d="M 125 113
           L 265 113
           L 265 115
           A 14 14 0 0 1 251 129
           L 139 129
           A 14 14 0 0 1 125 115 Z"
        fill="#003049"/>

  <rect x="130" y="68" width="130" height="38" fill="none" stroke="#c1121f" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="195" y="92" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="20" font-weight="700" fill="#fdf0d5">AERIS</text>

</svg>
