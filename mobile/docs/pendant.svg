<?xml version="1.0" encoding="UTF-8"?>
<!--
  Aeris mobile header pendant — editable mock of the SVG rendered by
  mobile/src/navigation/AppTabs.tsx (the AppTabsInner block, lines 79-198).

  Scales perfectly on iOS + Android via react-native-svg (already used in
  the app). The shapes are pure path data, so anything you change in this
  file maps 1:1 back to the path strings in AppTabs.tsx.

  Geometry constants — keep these in sync with AppTabs.tsx:79-84:
    BAND_H            = 48     (height of navy chrome strip)
    TONGUE_TOP_W      = 200    (wide shoulders, where wordmark sits)
    TONGUE_BOTTOM_W   = 140    (narrow base of the pendant)
    TONGUE_PROTRUSION = 16     (how far tongue hangs below chrome)
    TONGUE_RADIUS     = 14     (quarter-circle at very bottom corners)

  Sample width here = 390 (iPhone 14/15 dp width). In the app the path
  is rebuilt against the live screen width — only the X coordinates that
  reference `screenWidth` move. The Y coordinates and curve shapes stay
  the same on every device.

  Derived for width=390:
    cx   = 195    (centre line)
    ttiL = 95     cx - TONGUE_TOP_W/2     (top-left shoulder)
    ttiR = 295    cx + TONGUE_TOP_W/2     (top-right shoulder)
    tbiL = 125    cx - TONGUE_BOTTOM_W/2  (tongue base, left)
    tbiR = 265    cx + TONGUE_BOTTOM_W/2  (tongue base, right)
    tongueBottomY        = 64    BAND_H + TONGUE_PROTRUSION
    tongueBottomY-radius = 50    where the arc starts on each side

  Palette (from mobile/src/constants/theme.ts):
    navy   = #003049
    cream  = #fdf0d5  (also COLORS.background — the page colour)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="390" height="120"
     viewBox="0 0 390 120"
     preserveAspectRatio="xMidYMin meet">

  <!-- Page background (paper) so the pendant silhouette is visible while
       editing. In the app this is just the screen behind the SafeAreaView. -->
  <rect x="0" y="0" width="390" height="120" fill="#fdf0d5"/>

  <!-- Navy chrome strip (in the app this is the SafeAreaView backgroundColor). -->
  <rect x="0" y="0" width="390" height="48" fill="#003049"/>

  <!-- CREAM CUTOUTS — these "eat" the navy chrome on each side of the
       wordmark, leaving the wide-shouldered tongue silhouette in the
       middle. The single quadratic control point sits at the corner
       (tbiL, 0) / (tbiR, 0), which forces:
         - horizontal tangent at the chrome top edge (smooth meet)
         - vertical  tangent at the tongue side      (smooth meet)
       Swap Q for C (cubic) to introduce an inflection — gives the
       S-curve described in the design discussion. Example replacements
       are shown commented out below each Q path. -->

  <!-- creamLeft — extends full SVG height; inner edge traces the tongue's
       bottom-left arc so cream wraps cleanly around the pendant instead
       of stopping at the chrome line (which would expose the navy bg
       behind the SVG at the screen edges in the live app). -->
  <path d="M 0 0
           L 95 0
           Q 125 0, 125 48
           L 125 50
           A 14 14 0 0 0 139 64
           L 0 64 Z"
        fill="#fdf0d5"/>
  <!-- creamLeft — S-curve variant (cubic Bezier). Two control points let
       the curve bow OUT then back IN, giving the inflection point an S
       needs. Tune the two control points to taste:
         C  c1x c1y,  c2x c2y,  x y
       Starting suggestion (matches current width, adds gentle inflection):
         C 125 16, 95 32, 125 48
  <path d="M 0 0
           L 95 0
           C 125 16, 95 32, 125 48
           L 0 48 Z"
        fill="#fdf0d5"/>
  -->

  <!-- creamRight — mirror of creamLeft. -->
  <path d="M 390 0
           L 295 0
           Q 265 0, 265 48
           L 265 50
           A 14 14 0 0 1 251 64
           L 390 64 Z"
        fill="#fdf0d5"/>
  <!-- creamRight — S-curve variant (mirror of left)
       Starting suggestion:
         C 265 16, 295 32, 265 48
  <path d="M 390 0
           L 295 0
           C 265 16, 295 32, 265 48
           L 390 48 Z"
        fill="#fdf0d5"/>
  -->

  <!-- TONGUE — the navy pendant hanging below the chrome.
       Top edge (y=48) sits flush with the bottom of the chrome strip.
       Bottom corners are quarter-circle arcs (radius 22). -->
  <path d="M 125 48
           L 265 48
           L 265 50
           A 14 14 0 0 1 251 64
           L 139 64
           A 14 14 0 0 1 125 50 Z"
        fill="#003049"/>

  <!-- Wordmark placeholder — just a centred crimson rectangle so you can
       see how text/logo sits inside the pendant while tweaking curves.
       Not present in the app render; the real wordmark is a PNG image. -->
  <rect x="130" y="18" width="130" height="38" fill="none" stroke="#c1121f" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="195" y="42" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="20" font-weight="700" fill="#fdf0d5">AERIS</text>

</svg>
